name: Build & Deploy
on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '25'

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2

      # Cache downloaded packages — speeds up repeated deploys significantly
      - name: Cache bun packages
        uses: actions/cache@v5
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('frontend/package.json') }}
          restore-keys: |
            ${{ runner.os }}-bun-

      # Test gate: red tests block the deploy. Server tests don't need any
      # external env to run — all third-party calls are mocked.
      - name: Install root deps
        run: bun install

      - name: Run server tests
        env:
          # Stub values so config.ts's required-env check passes during tests.
          KLUSTER_API_KEY: ci-stub
          KLUSTER_API_BASE_URL: https://example.invalid
          IG_WORKER_ENABLED: 'false'
        run: bun test --bail server/src

      - name: Build frontend
        working-directory: frontend
        run: |
          echo "${{ secrets.FRONTEND_ENV }}" > .env
          bun install
          bun run build

      # Clone repo & install backend deps, then prepare the dist directory for SCP
      - name: Deploy backend
        uses: appleboy/ssh-action@v1.2.5
        with:
          host: ${{ secrets.SSH_HOST }}
          key: ${{ secrets.SSH_KEY }}
          username: ${{ secrets.SSH_USERNAME }}
          script: |
            set -e
            rm -rf ~/anthonyl.im/
            git clone git@github.com:anthonylim24/anthonyl.im.git
            cp ~/.env ~/anthonyl.im/.env
            cp ~/.env ~/anthonyl.im/frontend/.env
            cd ~/anthonyl.im/
            if [ ! -f ~/.bun/bin/bun ]; then
              curl -fsSL https://bun.sh/install | bash
            fi
            ~/.bun/bin/bun install

            # System tools the IG places worker needs at runtime. Idempotent —
            # apt-get install is a no-op when already at the latest version.
            if ! command -v yt-dlp >/dev/null 2>&1; then
              echo "[deploy] yt-dlp missing — installing latest standalone binary"
              sudo curl -L https://github.com/yt-dlp/yt-dlp/releases/latest/download/yt-dlp \
                -o /usr/local/bin/yt-dlp
              sudo chmod a+rx /usr/local/bin/yt-dlp
            fi
            if ! command -v ffmpeg >/dev/null 2>&1; then
              echo "[deploy] ffmpeg missing — installing via apt"
              sudo apt-get update -qq
              sudo apt-get install -y -qq ffmpeg
            fi
            echo "[deploy] yt-dlp: $(yt-dlp --version 2>/dev/null || echo MISSING)"
            echo "[deploy] ffmpeg: $(ffmpeg -version 2>/dev/null | head -1 || echo MISSING)"

      # Upload the CI-built dist — server never builds, so no OOM risk on 1GB droplet
      # scp-action preserves the full source path, so source "frontend/dist" + target "anthonyl.im"
      # lands at ~/anthonyl.im/frontend/dist — matching app.ts's production distPath
      - name: Upload frontend build
        uses: appleboy/scp-action@v1.0.0
        with:
          host: ${{ secrets.SSH_HOST }}
          key: ${{ secrets.SSH_KEY }}
          username: ${{ secrets.SSH_USERNAME }}
          source: "frontend/dist"
          target: "anthonyl.im"

      - name: Verify dist and restart PM2
        uses: appleboy/ssh-action@v1.2.5
        with:
          host: ${{ secrets.SSH_HOST }}
          key: ${{ secrets.SSH_KEY }}
          username: ${{ secrets.SSH_USERNAME }}
          script: |
            set -e
            export PATH="$HOME/.bun/bin:$PATH"

            if [ ! -f ~/anthonyl.im/frontend/dist/index.html ]; then
              echo "ERROR: frontend/dist/index.html not found"
              ls -laR ~/anthonyl.im/frontend/ 2>/dev/null || echo "frontend/ dir missing"
              exit 1
            fi
            echo "dist verified: $(ls ~/anthonyl.im/frontend/dist/ | wc -l) entries"

            if ! command -v pm2 &>/dev/null; then
              bun add -g pm2
            fi

            pm2 delete anthonyl.im 2>/dev/null || true
            cd ~/anthonyl.im
            pm2 start bun --name anthonyl.im -- run index.ts

            sleep 3
            pm2 logs anthonyl.im --lines 15 --nostream
            echo ""

            if pm2 show anthonyl.im | grep -q "status.*online"; then
              echo 'Deployment successful to Digital Ocean'
            else
              echo "ERROR: Process is not online"
              pm2 show anthonyl.im
              exit 1
            fi
