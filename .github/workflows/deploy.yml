name: Build & Deploy
on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '25'

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2

      # Cache downloaded packages — speeds up repeated deploys significantly
      - name: Cache bun packages
        uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('frontend/package.json') }}
          restore-keys: |
            ${{ runner.os }}-bun-

      - name: Build frontend
        working-directory: frontend
        run: |
          echo "${{ secrets.FRONTEND_ENV }}" > .env
          bun install
          bun run build

      # Clone repo & install backend deps, then prepare the dist directory for SCP
      - name: Deploy backend
        uses: appleboy/ssh-action@v1.2.5
        with:
          host: ${{ secrets.SSH_HOST }}
          key: ${{ secrets.SSH_KEY }}
          username: ${{ secrets.SSH_USERNAME }}
          script: |
            set -e
            rm -rf ~/anthonyl.im/
            git clone git@github.com:anthonylim24/anthonyl.im.git
            cp ~/.env ~/anthonyl.im/.env
            cd ~/anthonyl.im/
            if [ ! -f ~/.bun/bin/bun ]; then
              curl -fsSL https://bun.sh/install | bash
            fi
            ~/.bun/bin/bun install
            mkdir -p frontend/dist

      # Upload the CI-built dist — server never builds, so no OOM risk on 1GB droplet
      - name: Upload frontend build
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SSH_HOST }}
          key: ${{ secrets.SSH_KEY }}
          username: ${{ secrets.SSH_USERNAME }}
          source: "frontend/dist"
          target: "anthonyl.im/frontend"

      - name: Restart PM2
        uses: appleboy/ssh-action@v1.2.5
        with:
          host: ${{ secrets.SSH_HOST }}
          key: ${{ secrets.SSH_KEY }}
          username: ${{ secrets.SSH_USERNAME }}
          script: |
            set -e
            if [ ! -f ~/.bun/bin/pm2 ]; then
              ~/.bun/bin/bun add -g pm2
            fi
            ~/.bun/bin/pm2 restart anthonyl.im --update-env
            echo 'Deployment successful to Digital Ocean'
