name: Build & Deploy
on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '26'

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2

      # Cache downloaded packages — speeds up repeated deploys significantly
      - name: Cache bun packages
        uses: actions/cache@v5
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('frontend/package.json') }}
          restore-keys: |
            ${{ runner.os }}-bun-

      # Test gate: red tests block the deploy. Server tests don't need any
      # external env to run — all third-party calls are mocked.
      - name: Install root deps
        run: bun install

      - name: Run server tests
        env:
          # Stub values so config.ts's required-env check passes during tests.
          KLUSTER_API_KEY: ci-stub
          KLUSTER_API_BASE_URL: https://example.invalid
          IG_WORKER_ENABLED: 'false'
        run: bun test --bail server/src

      - name: Build frontend
        working-directory: frontend
        run: |
          echo "${{ secrets.FRONTEND_ENV }}" > .env
          bun install
          bun run build

      # Clone repo & install backend deps, then prepare the dist directory for SCP
      - name: Deploy backend
        uses: appleboy/ssh-action@v1.2.5
        with:
          host: ${{ secrets.SSH_HOST }}
          key: ${{ secrets.SSH_KEY }}
          username: ${{ secrets.SSH_USERNAME }}
          script: |
            set -e
            rm -rf ~/anthonyl.im/
            git clone git@github.com:anthonylim24/anthonyl.im.git
            cp ~/.env ~/anthonyl.im/.env
            cp ~/.env ~/anthonyl.im/frontend/.env
            cd ~/anthonyl.im/
            if [ ! -f ~/.bun/bin/bun ]; then
              curl -fsSL https://bun.sh/install | bash
            fi
            ~/.bun/bin/bun install

            # System tools the IG places worker needs at runtime. Each
            # installer is idempotent + non-fatal — a broken apt sources.list
            # or a transient mirror outage shouldn't fail the whole deploy.
            # The worker degrades gracefully (caption-only bundle) when these
            # are missing, so the website still goes live.

            if ! command -v yt-dlp >/dev/null 2>&1; then
              echo "[deploy] yt-dlp missing — installing latest standalone binary"
              sudo curl -fsSL https://github.com/yt-dlp/yt-dlp/releases/latest/download/yt-dlp \
                -o /usr/local/bin/yt-dlp \
                && sudo chmod a+rx /usr/local/bin/yt-dlp \
                || echo "[deploy] WARN: yt-dlp install failed; video pipeline will fall back to direct CDN fetch"
            fi

            if ! command -v ffmpeg >/dev/null 2>&1; then
              echo "[deploy] ffmpeg missing — trying apt first, static binary as fallback"
              # apt path. Use `apt-get install` (no update) so we use the
              # already-cached package lists. If the local cache is empty OR
              # the install itself fails (e.g., apt sources.list is broken),
              # fall through to the static-binary path.
              (sudo apt-get install -y -qq ffmpeg 2>&1 \
                | grep -v -E '^E: The repository' || true) >/dev/null
              if ! command -v ffmpeg >/dev/null 2>&1; then
                echo "[deploy] apt install of ffmpeg failed — fetching static binary"
                # John Van Sickle hosts canonical Linux x86_64 static builds.
                TMPF=$(mktemp -d)
                if curl -fsSL https://johnvansickle.com/ffmpeg/releases/ffmpeg-release-amd64-static.tar.xz \
                     -o "$TMPF/ffmpeg.tar.xz" \
                   && tar -xf "$TMPF/ffmpeg.tar.xz" -C "$TMPF" \
                   && FFBIN=$(find "$TMPF" -name ffmpeg -type f | head -1) \
                   && [ -n "$FFBIN" ]; then
                  sudo mv "$FFBIN" /usr/local/bin/ffmpeg
                  sudo chmod a+rx /usr/local/bin/ffmpeg
                  rm -rf "$TMPF"
                else
                  echo "[deploy] WARN: ffmpeg static-binary install also failed; transcription/frame-OCR will be skipped per-job"
                  rm -rf "$TMPF"
                fi
              fi
            fi

            # dev-browser: drives a headless Chromium for the IG video
            # extraction fallback (when yt-dlp is rate-limited AND direct
            # CDN download fails). First install grabs ~200 MB of headless
            # Chromium; subsequent runs are no-ops. ~190 MB RSS at runtime.
            if ! command -v dev-browser >/dev/null 2>&1; then
              echo "[deploy] dev-browser missing — installing globally"
              # Try global install; fall back to a non-fatal warn so the
              # deploy still ships if npm is unavailable.
              if sudo npm install -g dev-browser 2>&1 | tail -3; then
                # Trigger the one-time browser-binary download
                dev-browser install 2>&1 | tail -3 \
                  || echo "[deploy] WARN: dev-browser install (binary download) failed; headless fallback will be skipped"
              else
                echo "[deploy] WARN: dev-browser global install failed; headless fallback will be skipped"
              fi
            fi

            echo "[deploy] yt-dlp: $(command -v yt-dlp >/dev/null 2>&1 && yt-dlp --version 2>/dev/null || echo MISSING)"
            echo "[deploy] ffmpeg: $(command -v ffmpeg >/dev/null 2>&1 && ffmpeg -version 2>/dev/null | head -1 || echo MISSING)"
            echo "[deploy] dev-browser: $(command -v dev-browser >/dev/null 2>&1 && dev-browser --version 2>/dev/null || echo MISSING)"

      # Upload the CI-built dist — server never builds, so no OOM risk on 1GB droplet
      # scp-action preserves the full source path, so source "frontend/dist" + target "anthonyl.im"
      # lands at ~/anthonyl.im/frontend/dist — matching app.ts's production distPath
      - name: Upload frontend build
        uses: appleboy/scp-action@v1.0.0
        with:
          host: ${{ secrets.SSH_HOST }}
          key: ${{ secrets.SSH_KEY }}
          username: ${{ secrets.SSH_USERNAME }}
          source: "frontend/dist"
          target: "anthonyl.im"

      - name: Verify dist and restart PM2
        uses: appleboy/ssh-action@v1.2.5
        with:
          host: ${{ secrets.SSH_HOST }}
          key: ${{ secrets.SSH_KEY }}
          username: ${{ secrets.SSH_USERNAME }}
          script: |
            set -e
            # Non-interactive SSH inherits a minimal PATH that often omits
            # /usr/local/bin (where `sudo npm install -g` lands binaries
            # like dev-browser). Explicitly prepend the standard binary
            # dirs so PM2's child process can find yt-dlp, ffmpeg, and
            # dev-browser. Without this the IG worker logs
            # "[ig:bundle] dev-browser NOT in $PATH" and silently skips
            # the headless video fallback.
            export PATH="$HOME/.bun/bin:/usr/local/bin:/usr/bin:/bin:$PATH"

            if [ ! -f ~/anthonyl.im/frontend/dist/index.html ]; then
              echo "ERROR: frontend/dist/index.html not found"
              ls -laR ~/anthonyl.im/frontend/ 2>/dev/null || echo "frontend/ dir missing"
              exit 1
            fi
            echo "dist verified: $(ls ~/anthonyl.im/frontend/dist/ | wc -l) entries"

            if ! command -v pm2 &>/dev/null; then
              bun add -g pm2
            fi

            # Sanity-check binaries pm2's child needs at runtime
            echo "[deploy] PATH=$PATH"
            echo "[deploy] yt-dlp: $(command -v yt-dlp >/dev/null && which yt-dlp || echo MISSING)"
            echo "[deploy] ffmpeg: $(command -v ffmpeg >/dev/null && which ffmpeg || echo MISSING)"
            echo "[deploy] dev-browser: $(command -v dev-browser >/dev/null && which dev-browser || echo MISSING)"

            pm2 delete anthonyl.im 2>/dev/null || true
            cd ~/anthonyl.im
            # --update-env so PM2 captures the explicit PATH we just set
            # rather than the daemon's stale environment from a previous
            # deploy (which may not have included /usr/local/bin).
            pm2 start bun --name anthonyl.im --update-env -- run index.ts

            sleep 3
            pm2 logs anthonyl.im --lines 15 --nostream
            echo ""

            if pm2 show anthonyl.im | grep -q "status.*online"; then
              echo 'Deployment successful to Digital Ocean'
            else
              echo "ERROR: Process is not online"
              pm2 show anthonyl.im
              exit 1
            fi

      # Post-deploy smoke check. Runs from the GitHub runner against the
      # public URL — fails the deploy job if the site doesn't actually
      # serve a 200 with the expected SPA shell after the restart. This
      # is the last line of defense: if PM2 reports "online" but the app
      # crashed at first request (e.g., missing-export caught only at
      # route handling time), this catches it.
      - name: Post-deploy smoke (live URL returns 200 + SPA shell)
        run: |
          set -euo pipefail
          URL="https://anthonyl.im/"
          echo "[smoke] waiting 10s for app to warm up"
          sleep 10
          for attempt in 1 2 3; do
            echo "[smoke] attempt $attempt — GET $URL"
            BODY="$(curl -fsSL --max-time 15 "$URL")" && {
              if echo "$BODY" | grep -q '<div id="root">'; then
                echo "[smoke] OK — SPA shell served"
                exit 0
              fi
              echo "[smoke] WARN: 200 OK but SPA shell missing; retrying"
            }
            sleep 5
          done
          echo "::error::Post-deploy smoke failed — $URL is not serving the SPA shell"
          exit 1
