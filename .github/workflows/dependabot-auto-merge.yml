name: Dependabot Auto-merge

# This workflow approves + sets auto-merge on dependabot PRs. The
# `--auto` flag means GitHub will only complete the merge once all
# required status checks pass — which is the `pr-gate` aggregate check
# from .github/workflows/pr.yml (configured as required by branch
# protection on main). So dependabot PRs are gated identically to
# human PRs; this workflow just skips the human approval step.
on: pull_request_target

permissions:
  pull-requests: write
  contents: write

jobs:
  dependabot:
    runs-on: ubuntu-latest
    if: github.actor == 'dependabot[bot]'
    steps:
      - name: Fetch Dependabot metadata
        id: metadata
        uses: dependabot/fetch-metadata@v3
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Approve PR
        run: gh pr review --approve "$PR_URL"
        env:
          PR_URL: ${{ github.event.pull_request.html_url }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Enable auto-merge
        run: gh pr merge --auto --squash "$PR_URL"
        env:
          PR_URL: ${{ github.event.pull_request.html_url }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
