<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="transparent" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="description" content="Anthony Lim - Software Engineer. Ask me anything about my experience, skills, and background." />
    <meta property="og:site_name" content="Anthony Lim" />
    <meta property="og:type" content="website" />
    <meta name="twitter:card" content="summary" />

    <link rel="icon" type="image/svg+xml" href="/favicon-chat.svg" />
    <link rel="manifest" href="/site.webmanifest" />
    <link rel="icon" type="image/png" sizes="192x192" href="/icons/breathflow-192.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;0,700;1,300;1,400&family=Fragment+Mono:ital@0;1&family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />

    <title>Anthony Lim - Software Engineer</title>

    <script data-route-metadata="breathflow">
      (() => {
        if (!location.pathname.startsWith('/breathwork')) return;

        const title = 'BreathFlow - Scientific Breathwork';
        const description = 'BreathFlow is a warm, evidence-informed breathwork app for calm, sleep, focus, recovery, and performance training.';

        function setRouteMeta(selector, attribute, value, content) {
          let element = document.querySelector(selector);
          if (!element) {
            element = document.createElement('meta');
            element.setAttribute(attribute, value);
            document.head.appendChild(element);
          }
          element.setAttribute('content', content);
        }

        const favicon = document.querySelector('link[rel="icon"][type="image/svg+xml"]');
        if (favicon) favicon.setAttribute('href', '/favicon-breath.svg');

        document.title = title;
        setRouteMeta('meta[name="description"]', 'name', 'description', description);
        setRouteMeta('meta[property="og:title"]', 'property', 'og:title', title);
        setRouteMeta('meta[property="og:description"]', 'property', 'og:description', description);
        setRouteMeta('meta[name="twitter:title"]', 'name', 'twitter:title', title);
        setRouteMeta('meta[name="twitter:description"]', 'name', 'twitter:description', description);
      })();
    </script>

    <script data-route-metadata="korea">
      (() => {
        if (!location.pathname.startsWith('/korea')) return;

        const title = 'South Korea Itinerary — Seoul + Busan';
        const description = 'A 12-day Seoul + Busan trip with reservations, weather, smart links, and a 3D Map Mode that puts you at the center.';

        function setRouteMeta(selector, attribute, value, content) {
          let element = document.querySelector(selector);
          if (!element) {
            element = document.createElement('meta');
            element.setAttribute(attribute, value);
            document.head.appendChild(element);
          }
          element.setAttribute('content', content);
        }

        const manifest = document.querySelector('link[rel="manifest"]');
        if (manifest) manifest.setAttribute('href', '/korea.webmanifest');

        // Swap favicon to the Korea variant
        const favicon = document.querySelector('link[rel="icon"][type="image/svg+xml"]');
        if (favicon) favicon.setAttribute('href', '/favicon-korea.svg');

        // Theme color: warm rose tint
        const themeColor = document.querySelector('meta[name="theme-color"]');
        if (themeColor) themeColor.setAttribute('content', '#FBF6EE');

        document.title = title;
        setRouteMeta('meta[name="description"]', 'name', 'description', description);
        setRouteMeta('meta[property="og:title"]', 'property', 'og:title', title);
        setRouteMeta('meta[property="og:description"]', 'property', 'og:description', description);
        setRouteMeta('meta[name="twitter:title"]', 'name', 'twitter:title', title);
        setRouteMeta('meta[name="twitter:description"]', 'name', 'twitter:description', description);
      })();
    </script>

    <style>
      /* html background fills iOS safe areas (status bar, home indicator).
         Must match the page canvas so they blend seamlessly.
         Safari 26 liquid glass on the TOOLBAR is enabled by keeping
         position:fixed/sticky elements transparent (done in components). */
      html { background-color: #F5F2ED; }
      html.dark { background-color: #171613; }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
